version: "3.9"

services:
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8383:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis-stack:6379/0
    depends_on:
      redis-stack:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis-stack:6379/0
      - AGENT_BASE_URL=http://agent:8002
    depends_on:
      redis-stack:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  redis-data:
